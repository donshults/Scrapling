name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'scrapling/**'
      - 'Dockerfile.server'
      - 'railway.json'
      - 'pyproject.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service scrapling-mcp --detach
